name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOLANGCI_LINT_VERSION: v2.11.4

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Download modules
        run: go mod download
      - name: Verify modules
        run: go mod verify
      - name: Build packages
        run: go build ./...
      - name: Run tests
        run: go test ./...
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: ./...

  cross-build:
    if: github.event_name != 'release'
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Download modules
        run: go mod download
      - name: Cross-compile runner
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath .

  release-builds:
    if: github.event_name == 'release'
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Download modules
        run: go mod download
      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist

          VERSION="${GITHUB_REF_NAME}"
          COMMIT="${GITHUB_SHA::7}"
          DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          LDFLAGS="-s -w -X 'main.version=${VERSION}' -X 'main.commit=${COMMIT}' -X 'main.date=${DATE}'"

          case "$GOOS" in
            darwin) goos_label="Darwin" ;;
            linux) goos_label="Linux" ;;
            windows) goos_label="Windows" ;;
            *) goos_label="$GOOS" ;;
          esac

          case "$GOARCH" in
            amd64) goarch_label="x86_64" ;;
            arm64) goarch_label="arm64" ;;
            *) goarch_label="$GOARCH" ;;
          esac

          output="dist/resterm-runner_${goos_label}_${goarch_label}"
          if [ "$GOOS" = "windows" ]; then
            output="${output}.exe"
          fi

          echo "Building version $VERSION"
          GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags "$LDFLAGS" -o "$output" .
          sha256sum "$output" | awk '{print $1}' > "${output}.sha256"
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
